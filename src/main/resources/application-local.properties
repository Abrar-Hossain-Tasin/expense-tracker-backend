spring.datasource.url=jdbc:h2:mem:poshhouse;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql

app.jwt.secret=local-secret-key-that-is-long-enough-for-hmac-signing
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=1209600000
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
